name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Test, Build & Push"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to K3s
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (Tailscale)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }}
          username: mohammed
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2026
          envs: GRAFANA_ADMIN_PASSWORD
          script: |
            set -e
            echo "══════════════════════════════════"
            echo "  🚀 Deploying infra-full-stack..."
            echo "══════════════════════════════════"

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            # Pull latest manifests
            cd /home/mohammed/infra-full-stack
            git pull origin main 2>/dev/null || true

            # Create/Update Grafana secret
            sudo k3s kubectl create secret generic grafana-secrets \
              --namespace=infra-full-stack \
              --from-literal=admin-password="$GRAFANA_ADMIN_PASSWORD" \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # Apply manifests
            sudo k3s kubectl apply -f kubernetes/namespace.yaml
            sudo k3s kubectl apply -f kubernetes/app/
            sudo k3s kubectl apply -f kubernetes/monitoring/prometheus/
            sudo k3s kubectl apply -f kubernetes/monitoring/grafana/

            # Rolling restart to pull latest image
            sudo k3s kubectl rollout restart deployment/flask-app -n infra-full-stack

            # Wait for rollout
            sudo k3s kubectl rollout status deployment/flask-app -n infra-full-stack --timeout=120s

            echo ""
            echo "══════════════════════════════════"
            echo "  ✅ Deployment Complete!"
            echo "══════════════════════════════════"
            sudo k3s kubectl get pods -n infra-full-stack
            echo ""

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_TAILSCALE_IP }}
          username: mohammed
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2026
          script: |
            sleep 15
            for i in $(seq 1 6); do
              if curl -sf http://localhost:30080/health > /dev/null 2>&1; then
                echo "✅ Health check passed!"
                exit 0
              fi
              echo "⏳ Attempt $i/6 — waiting 10s..."
              sleep 10
            done
            echo "❌ Health check failed"
            exit 1

      - name: Notify Telegram (Success)
        if: success()
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *infra-full-stack Deployed!*
          📦 Image: \`mohammed512/infra-full-stack:latest\`
          🔢 Build: #${{ github.run_number }}
          👤 By: ${{ github.actor }}" || true

      - name: Notify Telegram (Failure)
        if: failure()
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *infra-full-stack Deploy FAILED!*
          🔢 Build: #${{ github.run_number }}
          🔗 [Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true
